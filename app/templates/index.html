<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Bonsai Llama</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .message-markdown pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 0.9rem;
      border-radius: 0.5rem;
      overflow-x: auto;
    }

    .message-markdown code {
      background: rgba(15, 23, 42, 0.08);
      padding: 0.12rem 0.35rem;
      border-radius: 0.35rem;
    }

    .message-markdown pre code {
      background: transparent;
      padding: 0;
    }

    .message-markdown p:last-child,
    .message-markdown ul:last-child,
    .message-markdown ol:last-child,
    .message-markdown pre:last-child {
      margin-bottom: 0;
    }

    .message-markdown p,
    .message-markdown ul,
    .message-markdown ol {
      margin-bottom: 0.85rem;
    }

    .message-markdown ol,
    .message-markdown ul {
      padding-left: 1.35rem;
    }

    .message-markdown li + li {
      margin-top: 0.3rem;
    }

    .message-markdown h1,
    .message-markdown h2,
    .message-markdown h3,
    .message-markdown h4 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
    }
  </style>
</head>
<body class="bg-body-tertiary">
  <div class="container-fluid">
    <div class="row min-vh-100">
      <aside class="col-12 col-lg-3 border-end bg-white p-4">
        <h4 class="mb-4">Settings</h4>
        <form id="chatForm" class="d-grid gap-3">
          <div>
            <label for="model" class="form-label">Model</label>
            <select id="model" class="form-select" name="model" {% if not models %}disabled{% endif %}>
              {% if models %}
                {% for m in models %}
                  <option value="{{ m }}" {% if m == default_model %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
              {% else %}
                <option>No models found</option>
              {% endif %}
            </select>
          </div>
          <div>
            <label for="n" class="form-label">Tokens</label>
            <input id="n" type="number" name="n" value="64" class="form-control">
          </div>
          <div>
            <label for="temp" class="form-label">Temp</label>
            <input id="temp" type="number" step="0.1" name="temp" value="0.5" class="form-control">
          </div>
          <div>
            <label for="top_p" class="form-label">Top P</label>
            <input id="top_p" type="number" step="0.05" name="top_p" value="0.9" class="form-control">
          </div>
          <div>
            <label for="top_k" class="form-label">Top K</label>
            <input id="top_k" type="number" name="top_k" value="30" class="form-control">
          </div>
          <div>
            <label for="ngl" class="form-label">GPU Layers</label>
            <input id="ngl" type="number" name="ngl" value="0" class="form-control">
          </div>
          <div class="border rounded p-3 bg-light">
            <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
              <span class="fw-semibold">Context Meter</span>
              <span id="contextStatus" class="badge text-bg-secondary">Healthy</span>
            </div>
            <div class="small text-secondary mb-2">
              <div>Transcript chars: <span id="transcriptChars">0</span> / {{ max_prompt_chars }}</div>
              <div>Approx input tokens: <span id="transcriptTokens">0</span></div>
              <div>Output tokens setting: <span id="outputTokens">64</span> / {{ max_tokens }}</div>
              <div>Saved turns: <span id="historyTurns">0</span> / {{ max_history_turns }}</div>
            </div>
            <div class="progress" role="progressbar" aria-label="Transcript size">
              <div id="contextProgress" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </form>
      </aside>

      <main class="col-12 col-lg-9 d-flex flex-column p-0">
        <div id="alertBox" class="p-3 pb-0"></div>
        <div id="chatBox" class="flex-grow-1 p-4 overflow-auto bg-light"></div>
        <div class="border-top bg-white p-4">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <label for="prompt" class="form-label mb-0">Prompt</label>
            <button id="clearButton" type="button" class="btn btn-outline-secondary btn-sm" onclick="clearChat()">Clear Chat</button>
          </div>
          <textarea id="prompt" class="form-control" rows="4" placeholder="Ask something..." {% if not models %}disabled{% endif %}></textarea>
          <div class="d-flex align-items-center gap-3 mt-3">
            <button id="sendButton" class="btn btn-primary" onclick="sendChat()" {% if not models %}disabled{% endif %}>Send</button>
            <span id="statusText" class="text-secondary small"></span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script>
    const chatBox = document.getElementById("chatBox");
    const promptInput = document.getElementById("prompt");
    const form = document.getElementById("chatForm");
    const sendButton = document.getElementById("sendButton");
    const statusText = document.getElementById("statusText");
    const alertBox = document.getElementById("alertBox");
    const transcriptChars = document.getElementById("transcriptChars");
    const transcriptTokens = document.getElementById("transcriptTokens");
    const outputTokens = document.getElementById("outputTokens");
    const historyTurns = document.getElementById("historyTurns");
    const contextStatus = document.getElementById("contextStatus");
    const contextProgress = document.getElementById("contextProgress");
    const tokenInput = document.getElementById("n");
    const tempInput = document.getElementById("temp");
    const topPInput = document.getElementById("top_p");
    const topKInput = document.getElementById("top_k");
    const nglInput = document.getElementById("ngl");
    const STORAGE_KEY = "bonsai-llama-chat-state";
    const MAX_HISTORY_TURNS = {{ max_history_turns }};
    const MAX_PROMPT_CHARS = {{ max_prompt_chars }};
    const DEFAULT_BEHAVIOR = {{ default_behavior|tojson }};
    let chatHistory = [];
    let currentController = null;
    let currentAssistantMessage = null;
    let isGenerating = false;

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function appendMessage(label, text, tone) {
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3";
      wrapper.innerHTML = `
        <div class="fw-semibold">${label}</div>
        <div class="border rounded p-3 bg-${tone}">${escapeHtml(text).replace(/\n/g, "<br>")}</div>
      `;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendRenderedAssistantMessage(text) {
      const messageView = createStreamingMessage("AI", "body-tertiary");
      updateAssistantMessage(messageView, text, true);
    }

    function createStreamingMessage(label, tone) {
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3";
      wrapper.innerHTML = `
        <div class="d-flex align-items-center justify-content-between gap-2 mb-1">
          <div class="fw-semibold">${label}</div>
          <button type="button" class="btn btn-outline-secondary btn-sm copy-button" disabled>Copy</button>
        </div>
        <div class="border rounded p-3 bg-${tone}">
          <div class="message-content message-markdown"></div>
        </div>
      `;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
      return {
        contentEl: wrapper.querySelector(".message-content"),
        copyButton: wrapper.querySelector(".copy-button"),
        wrapper
      };
    }

    function showAlert(message) {
      alertBox.innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show mb-0" role="alert">
          ${message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    function clearAlert() {
      alertBox.innerHTML = "";
    }

    function resetGenerationState() {
      if (currentController) {
        currentController.abort();
        currentController = null;
      }
      isGenerating = false;
      sendButton.disabled = false;
      statusText.textContent = "";
    }

    function cancelActiveGeneration(options = {}) {
      const { removePendingUser = false } = options;
      if (!isGenerating && !currentController) return;

      if (currentController) {
        currentController.abort();
        currentController = null;
      }

      isGenerating = false;
      sendButton.disabled = false;
      statusText.textContent = "";

      if (removePendingUser && chatHistory.length && chatHistory[chatHistory.length - 1].role === "user") {
        chatHistory.pop();
        saveState();
        updateTranscriptPreview(promptInput.value);
      }
    }

    function estimateTokens(text) {
      return Math.max(1, Math.ceil(text.length / 4));
    }

    function buildTranscriptPreview(currentPrompt = "") {
      const sections = [`System: ${DEFAULT_BEHAVIOR}`];
      const trimmedHistory = chatHistory.slice(-MAX_HISTORY_TURNS);
      for (const message of trimmedHistory) {
        if (!message.content) continue;
        if (message.role === "user") {
          sections.push(`User: ${message.content}`);
        } else if (message.role === "assistant") {
          sections.push(`Assistant: ${message.content}`);
        }
      }

      if (currentPrompt.trim()) {
        sections.push(`User: ${currentPrompt.trim()}`);
      }
      sections.push("Assistant:");

      let transcript = sections.join("\n\n");
      if (transcript.length > MAX_PROMPT_CHARS) {
        transcript = transcript.slice(-MAX_PROMPT_CHARS);
      }
      return transcript;
    }

    function updateTranscriptPreview(currentPrompt = "") {
      const transcript = buildTranscriptPreview(currentPrompt);
      const charCount = transcript.length;
      const approxTokens = estimateTokens(transcript);
      const outputSetting = Number(tokenInput.value || 0);
      const usageRatio = Math.min(100, Math.round((charCount / MAX_PROMPT_CHARS) * 100));

      transcriptChars.textContent = String(charCount);
      transcriptTokens.textContent = String(approxTokens);
      outputTokens.textContent = String(outputSetting);
      historyTurns.textContent = String(Math.floor(chatHistory.length / 2));
      contextProgress.style.width = `${usageRatio}%`;

      contextProgress.className = "progress-bar";
      contextStatus.className = "badge text-bg-secondary";
      contextStatus.textContent = "Healthy";

      if (usageRatio >= 90) {
        contextProgress.classList.add("bg-danger");
        contextStatus.className = "badge text-bg-danger";
        contextStatus.textContent = "Near Limit";
      } else if (usageRatio >= 70) {
        contextProgress.classList.add("bg-warning");
        contextStatus.className = "badge text-bg-warning";
        contextStatus.textContent = "Getting Full";
      } else {
        contextProgress.classList.add("bg-success");
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history: chatHistory
      }));
    }

    function renderMarkdown(text) {
      const unsafeHtml = marked.parse(text, { breaks: true, gfm: true });
      return DOMPurify.sanitize(unsafeHtml);
    }

    function updateAssistantMessage(messageView, text, renderFinal = false) {
      messageView.copyButton.disabled = !text.trim();
      messageView.copyButton.dataset.copyText = text;

      if (renderFinal) {
        messageView.contentEl.innerHTML = renderMarkdown(text);
      } else {
        messageView.contentEl.textContent = text;
      }
    }

    function restoreState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const state = JSON.parse(raw);
        chatHistory = Array.isArray(state.history) ? state.history : [];

        for (const message of chatHistory) {
          if (message.role === "user") {
            appendMessage("You", message.content, "white");
          } else if (message.role === "assistant") {
            appendRenderedAssistantMessage(message.content);
          }
        }
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function clearChat() {
      chatHistory = [];
      chatBox.innerHTML = "";
      clearAlert();
      saveState();
      updateTranscriptPreview();
      promptInput.focus();
    }

    async function sendChat() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      cancelActiveGeneration();
      clearAlert();
      const data = new FormData(form);
      data.append("prompt", prompt);
      data.append("history_json", JSON.stringify(chatHistory));

      appendMessage("You", prompt, "white");
      chatHistory.push({ role: "user", content: prompt });
      updateTranscriptPreview();
      const aiMessage = createStreamingMessage("AI", "body-tertiary");
      currentAssistantMessage = aiMessage;
      promptInput.value = "";
      currentController = new AbortController();
      isGenerating = true;
      sendButton.disabled = true;
      statusText.textContent = "Running llama-completion...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          body: data,
          signal: currentController.signal
        });

        if (!response.ok) {
          const payload = await response.json();
          updateAssistantMessage(aiMessage, "", false);
          showAlert(payload.detail || "Request failed");
          return;
        }

        if (!response.body) {
          updateAssistantMessage(aiMessage, "", false);
          showAlert("Streaming response body was not available.");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantReply = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.trim()) continue;
            const event = JSON.parse(line);

            if (event.type === "token") {
              assistantReply += event.content;
              updateAssistantMessage(aiMessage, assistantReply, false);
              chatBox.scrollTop = chatBox.scrollHeight;
            } else if (event.type === "error") {
              updateAssistantMessage(aiMessage, assistantReply.trim(), false);
              chatHistory.pop();
              showAlert(event.content || "Generation failed.");
              saveState();
              updateTranscriptPreview();
            } else if (event.type === "done") {
              assistantReply = assistantReply.trim();
              updateAssistantMessage(aiMessage, assistantReply || "(empty response)", true);
              if (assistantReply) {
                chatHistory.push({ role: "assistant", content: assistantReply });
              }
              saveState();
              updateTranscriptPreview();
              currentAssistantMessage = null;
            }
          }
        }

        if (!assistantReply.trim()) {
          updateAssistantMessage(aiMessage, "(empty response)", false);
        }
      } catch (error) {
        if (error.name !== "AbortError") {
          updateAssistantMessage(aiMessage, "", false);
          chatHistory.pop();
          showAlert(error.message || "Request failed");
          saveState();
          updateTranscriptPreview();
        }
      } finally {
        currentController = null;
        currentAssistantMessage = null;
        isGenerating = false;
        sendButton.disabled = false;
        statusText.textContent = "";
        promptInput.focus();
      }
    }

    promptInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChat();
      }
    });

    chatBox.addEventListener("click", async (event) => {
      const button = event.target.closest(".copy-button");
      if (!button) return;

      const rawText = button.dataset.copyText || "";
      if (!rawText.trim()) return;

      try {
        await navigator.clipboard.writeText(rawText);
        const original = button.textContent;
        button.textContent = "Copied";
        setTimeout(() => {
          button.textContent = original;
        }, 1200);
      } catch (error) {
        showAlert("Could not copy the response to the clipboard.");
      }
    });

    promptInput.addEventListener("input", () => {
      if (isGenerating) {
        cancelActiveGeneration({ removePendingUser: true });
        if (currentAssistantMessage) {
          currentAssistantMessage.wrapper.remove();
          currentAssistantMessage = null;
        }
      }
      updateTranscriptPreview(promptInput.value);
    });
    tokenInput.addEventListener("input", () => updateTranscriptPreview(promptInput.value));
    restoreState();
    updateTranscriptPreview();
  </script>
</body>
</html>
