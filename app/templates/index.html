<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Bonsai Llama</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <div class="container-fluid">
    <div class="row min-vh-100">
      <aside class="col-12 col-lg-3 border-end bg-white p-4">
        <h4 class="mb-4">Settings</h4>
        <form id="chatForm" class="d-grid gap-3">
          <div>
            <label for="model" class="form-label">Model</label>
            <select id="model" class="form-select" name="model" {% if not models %}disabled{% endif %}>
              {% if models %}
                {% for m in models %}
                  <option value="{{ m }}" {% if m == default_model %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
              {% else %}
                <option>No models found</option>
              {% endif %}
            </select>
          </div>
          <div>
            <label for="n" class="form-label">Tokens</label>
            <input id="n" type="number" name="n" value="64" class="form-control">
          </div>
          <div>
            <label for="temp" class="form-label">Temp</label>
            <input id="temp" type="number" step="0.1" name="temp" value="0.5" class="form-control">
          </div>
          <div>
            <label for="top_p" class="form-label">Top P</label>
            <input id="top_p" type="number" step="0.05" name="top_p" value="0.9" class="form-control">
          </div>
          <div>
            <label for="top_k" class="form-label">Top K</label>
            <input id="top_k" type="number" name="top_k" value="30" class="form-control">
          </div>
          <div>
            <label for="ngl" class="form-label">GPU Layers</label>
            <input id="ngl" type="number" name="ngl" value="0" class="form-control">
          </div>
        </form>
      </aside>

      <main class="col-12 col-lg-9 d-flex flex-column p-0">
        <div id="alertBox" class="p-3 pb-0"></div>
        <div id="chatBox" class="flex-grow-1 p-4 overflow-auto bg-light"></div>
        <div class="border-top bg-white p-4">
          <label for="prompt" class="form-label">Prompt</label>
          <textarea id="prompt" class="form-control" rows="4" placeholder="Ask something..." {% if not models %}disabled{% endif %}></textarea>
          <div class="d-flex align-items-center gap-3 mt-3">
            <button id="sendButton" class="btn btn-primary" onclick="sendChat()" {% if not models %}disabled{% endif %}>Send</button>
            <span id="statusText" class="text-secondary small"></span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const promptInput = document.getElementById("prompt");
    const form = document.getElementById("chatForm");
    const sendButton = document.getElementById("sendButton");
    const statusText = document.getElementById("statusText");
    const alertBox = document.getElementById("alertBox");

    function appendMessage(label, text, tone) {
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3";
      wrapper.innerHTML = `
        <div class="fw-semibold">${label}</div>
        <div class="border rounded p-3 bg-${tone}">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}</div>
      `;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function createStreamingMessage(label, tone) {
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3";
      wrapper.innerHTML = `
        <div class="fw-semibold">${label}</div>
        <div class="border rounded p-3 bg-${tone}"><span class="message-content"></span></div>
      `;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
      return wrapper.querySelector(".message-content");
    }

    function showAlert(message) {
      alertBox.innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show mb-0" role="alert">
          ${message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    function clearAlert() {
      alertBox.innerHTML = "";
    }

    async function sendChat() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      clearAlert();
      const data = new FormData(form);
      data.append("prompt", prompt);

      appendMessage("You", prompt, "white");
      const aiMessage = createStreamingMessage("AI", "body-tertiary");
      promptInput.value = "";
      sendButton.disabled = true;
      statusText.textContent = "Running llama-completion...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          body: data
        });

        if (!response.ok) {
          const payload = await response.json();
          aiMessage.textContent = "";
          showAlert(payload.detail || "Request failed");
          return;
        }

        if (!response.body) {
          aiMessage.textContent = "";
          showAlert("Streaming response body was not available.");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.trim()) continue;
            const event = JSON.parse(line);

            if (event.type === "token") {
              aiMessage.textContent += event.content;
              chatBox.scrollTop = chatBox.scrollHeight;
            } else if (event.type === "error") {
              aiMessage.textContent = aiMessage.textContent.trim();
              showAlert(event.content || "Generation failed.");
            }
          }
        }

        aiMessage.textContent = aiMessage.textContent.trim() || "(empty response)";
      } catch (error) {
        aiMessage.textContent = "";
        showAlert(error.message || "Request failed");
      } finally {
        sendButton.disabled = false;
        statusText.textContent = "";
        promptInput.focus();
      }
    }

    promptInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChat();
      }
    });
  </script>
</body>
</html>
